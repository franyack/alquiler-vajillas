# CI: valida el proyecto antes de merge a main y en cada push a main.
# Activar "Require status checks to pass" en main para bloquear merges si falla.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate project
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          for f in index.html script.js styles.css manifest.json; do
            test -f "$f" || { echo "Missing required file: $f"; exit 1; }
          done
          for f in categories/mobiliario.html categories/vajilla.html categories/copas.html categories/accesorios.html; do
            test -f "$f" || { echo "Missing required file: $f"; exit 1; }
          done
          echo "All required files present."

      - name: Validate manifest.json
        run: |
          node -e "JSON.parse(require('fs').readFileSync('manifest.json', 'utf8')); console.log('manifest.json is valid JSON');"

      - name: Validate script.js syntax
        run: |
          node --check script.js && echo "script.js syntax OK"

      - name: Basic HTML check (index)
        run: |
          grep -q '</html>' index.html && grep -q '<script src="script.js">' index.html && echo "index.html structure OK"
